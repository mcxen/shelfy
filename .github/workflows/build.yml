name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Match tag and application versions
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          node - <<'NODE' "$VERSION"
          const fs = require("node:fs");
          const expected = process.argv[2];
          const versions = {
            "package.json": require("./package.json").version,
            "src-tauri/tauri.conf.json": require("./src-tauri/tauri.conf.json").version,
            "src-tauri/Cargo.toml": fs.readFileSync("src-tauri/Cargo.toml", "utf8")
              .match(/^version\s*=\s*"([^"]+)"/m)?.[1],
          };
          for (const [file, version] of Object.entries(versions)) {
            if (version !== expected) {
              throw new Error(`${file} has version ${version}; expected ${expected} from tag`);
            }
          }
          NODE

  build:
    name: Build ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            artifact: windows-x64
            platform: windows-latest
            args: ""
          - name: Linux x64
            artifact: linux-x64
            platform: ubuntu-22.04
            args: ""
          - name: macOS Universal
            artifact: macos-universal
            platform: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop bundle
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.args }}" ]; then
            npm run tauri build -- ${{ matrix.args }}
          else
            npm run tauri build
          fi

      - name: Collect Windows assets
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/msi/*.msi release-assets/
          cp src-tauri/target/release/bundle/nsis/*.exe release-assets/
          cp src-tauri/target/release/shelfy.exe "release-assets/Shelfy_${VERSION}_x64-portable.exe"

      - name: Collect Linux assets
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp src-tauri/target/release/bundle/appimage/*.AppImage release-assets/
          cp src-tauri/target/release/bundle/deb/*.deb release-assets/
          cp src-tauri/target/release/bundle/rpm/*.rpm release-assets/

      - name: Collect macOS assets
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          BUNDLE_ROOT="src-tauri/target/universal-apple-darwin/release/bundle"
          cp "$BUNDLE_ROOT"/dmg/*.dmg release-assets/
          tar -czf release-assets/Shelfy_universal.app.tar.gz -C "$BUNDLE_ROOT/macos" Shelfy.app

      - name: Upload platform assets
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download platform assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: downloaded-assets

      - name: Flatten and verify release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          while IFS= read -r -d '' asset; do
            target="release-assets/$(basename "$asset")"
            test ! -e "$target" || {
              echo "duplicate release asset: $(basename "$asset")" >&2
              exit 1
            }
            mv "$asset" "$target"
          done < <(find downloaded-assets -type f -print0)

          VERSION="${GITHUB_REF_NAME#v}"
          required=(
            "Shelfy_${VERSION}_universal.dmg"
            "Shelfy_universal.app.tar.gz"
            "Shelfy_${VERSION}_x64_en-US.msi"
            "Shelfy_${VERSION}_x64-setup.exe"
            "Shelfy_${VERSION}_x64-portable.exe"
            "Shelfy_${VERSION}_amd64.AppImage"
            "Shelfy_${VERSION}_amd64.deb"
            "Shelfy-${VERSION}-1.x86_64.rpm"
          )
          for asset in "${required[@]}"; do
            test -s "release-assets/$asset" || {
              echo "missing or empty release asset: $asset" >&2
              exit 1
            }
          done
          find release-assets -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ## Downloads
          - **macOS**: universal `.dmg` or `.app.tar.gz` (Apple Silicon and Intel; unsigned)
          - **Windows**: `.msi`, `-setup.exe`, or portable `.exe`
          - **Linux**: `.AppImage`, `.deb`, or `.rpm`

          See the commit history for the complete changes.
          EOF

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -d '' assets < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "Shelfy $GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi
