name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Match tag and application versions
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          node - <<'NODE' "$VERSION"
          const fs = require("node:fs");
          const expected = process.argv[2];
          const versions = {
            "package.json": require("./package.json").version,
            "src-tauri/tauri.conf.json": require("./src-tauri/tauri.conf.json").version,
            "src-tauri/Cargo.toml": fs.readFileSync("src-tauri/Cargo.toml", "utf8")
              .match(/^version\s*=\s*"([^"]+)"/m)?.[1],
          };
          for (const [file, version] of Object.entries(versions)) {
            if (version !== expected) {
              throw new Error(`${file} has version ${version}; expected ${expected} from tag`);
            }
          }
          NODE

  publish:
    name: Build ${{ matrix.name }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            args: ""
          - name: Linux x64
            platform: ubuntu-22.04
            args: ""
          - name: macOS Universal
            platform: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Shelfy ${{ github.ref_name }}
          releaseBody: |
            ## Downloads
            - **macOS**: universal `.dmg` (Apple Silicon and Intel; unsigned)
            - **Windows**: `.msi` or `-setup.exe`
            - **Linux**: `.AppImage`, `.deb`, or `.rpm`

            See the commit history for the complete changes.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Windows portable executable
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ASSET="Shelfy_${VERSION}_x64-portable.exe"
          cp src-tauri/target/release/shelfy.exe "$ASSET"
          gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber
